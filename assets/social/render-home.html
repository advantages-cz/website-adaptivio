<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8">
  <title>Adaptivio OG Render</title>
  <style>
    @font-face {
      font-family: "Matter Trial";
      src: url("../brand/fonts/Matter-TRIAL-Regular.otf") format("opentype");
      font-style: normal;
      font-weight: 400;
    }

    @font-face {
      font-family: "Matter Trial";
      src: url("../brand/fonts/Matter-TRIAL-Bold.otf") format("opentype");
      font-style: normal;
      font-weight: 700;
    }

    :root {
      --orange: #FF6512;
      --blue: #81EAFC;
      --ink: #050505;
      --white: #FFFFFF;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 1200px;
      height: 630px;
      overflow: hidden;
      font-family: "Matter Trial", Arial, sans-serif;
    }

    body {
      position: relative;
      background:
        radial-gradient(circle at 15% 22%, rgba(255, 255, 255, 0.14), transparent 26%),
        radial-gradient(circle at 78% 20%, rgba(129, 234, 252, 0.32), transparent 24%),
        radial-gradient(circle at 60% 82%, rgba(255, 101, 18, 0.28), transparent 26%),
        linear-gradient(125deg, #050505 0%, #101010 18%, #FF6512 56%, #81EAFC 100%);
      color: var(--white);
    }

    body::before,
    body::after {
      content: "";
      position: absolute;
      inset: auto;
      border-radius: 999px;
      filter: blur(28px);
      opacity: 0.75;
      pointer-events: none;
    }

    body::before {
      top: -80px;
      left: -120px;
      width: 540px;
      height: 420px;
      background: rgba(0, 0, 0, 0.55);
      transform: rotate(-16deg);
    }

    body::after {
      right: -90px;
      bottom: -140px;
      width: 460px;
      height: 380px;
      background: rgba(129, 234, 252, 0.2);
    }

    .frame {
      position: relative;
      width: 100%;
      height: 100%;
      padding: 62px 68px;
      display: grid;
      grid-template-columns: 1.05fr .95fr;
      align-items: center;
      gap: 36px;
    }

    .symbol-wrap {
      position: relative;
      align-self: stretch;
      display: grid;
      place-items: center start;
    }

    .symbol-wrap::before {
      content: "";
      position: absolute;
      left: 20px;
      top: 84px;
      width: 320px;
      height: 240px;
      background: rgba(255, 255, 255, 0.14);
      filter: blur(32px);
      border-radius: 45% 55% 48% 52% / 44% 43% 57% 56%;
    }

    .symbol {
      position: relative;
      width: 352px;
      height: auto;
      display: block;
      filter: drop-shadow(0 24px 44px rgba(0, 0, 0, 0.22));
    }

    .copy {
      align-self: center;
      max-width: 470px;
    }

    h1 {
      margin: 0 0 18px;
      font-size: 88px;
      line-height: 0.93;
      letter-spacing: -0.06em;
      font-weight: 700;
    }

    p {
      margin: 0;
      max-width: 17ch;
      font-size: 30px;
      line-height: 1.14;
      letter-spacing: -0.03em;
      color: rgba(255, 255, 255, 0.9);
    }

    .domain {
      position: absolute;
      left: 68px;
      bottom: 54px;
      display: inline-flex;
      align-items: center;
      min-height: 44px;
      padding: 0 18px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(16px);
      font-size: 22px;
      letter-spacing: -0.02em;
      color: rgba(255, 255, 255, 0.95);
    }
  </style>
</head>
<body>
  <main class="frame">
    <div class="symbol-wrap">
      <img class="symbol" src="../brand/logo/adaptivio-symbol-white.svg" alt="">
    </div>
    <section class="copy" aria-label="Preview text">
      <h1>Adaptivio</h1>
      <p>Leadership, talent a růst týmů s energií, která se přenáší do praxe.</p>
    </section>
    <div class="domain">adaptivio.com</div>
  </main>
</body>
</html>
