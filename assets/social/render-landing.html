<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8">
  <title>Leadership Camp OG Render</title>
  <style>
    @font-face {
      font-family: "Matter Trial";
      src: url("../brand/fonts/Matter-TRIAL-Regular.otf") format("opentype");
      font-style: normal;
      font-weight: 400;
    }

    @font-face {
      font-family: "Matter Trial";
      src: url("../brand/fonts/Matter-TRIAL-Bold.otf") format("opentype");
      font-style: normal;
      font-weight: 700;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 1200px;
      height: 630px;
      overflow: hidden;
      font-family: "Matter Trial", Arial, sans-serif;
      background: #000;
    }

    body {
      position: relative;
      color: #fff;
    }

    .photo {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 38%;
      transform: scale(1.02);
      filter: saturate(0.96) contrast(1.03);
    }

    .overlay {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, rgba(0, 0, 0, 0.84) 0%, rgba(0, 0, 0, 0.62) 37%, rgba(0, 0, 0, 0.16) 72%, rgba(0, 0, 0, 0.08) 100%),
        linear-gradient(180deg, rgba(0, 0, 0, 0.2) 0%, rgba(0, 0, 0, 0.32) 100%);
    }

    .overlay::before {
      content: "";
      position: absolute;
      top: -120px;
      left: -80px;
      width: 460px;
      height: 320px;
      border-radius: 999px;
      background: rgba(255, 101, 18, 0.34);
      filter: blur(40px);
    }

    .overlay::after {
      content: "";
      position: absolute;
      left: 66px;
      bottom: 76px;
      width: 2px;
      height: 126px;
      background: rgba(129, 234, 252, 0.92);
    }

    .frame {
      position: relative;
      z-index: 1;
      display: grid;
      align-content: end;
      width: 100%;
      height: 100%;
      padding: 58px 66px;
    }

    .eyebrow {
      margin: 0 0 18px 22px;
      font-size: 18px;
      line-height: 1;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(129, 234, 252, 0.96);
    }

    h1 {
      margin: 0 0 16px 22px;
      max-width: 9ch;
      font-size: 78px;
      line-height: 0.94;
      letter-spacing: -0.055em;
      font-weight: 700;
      text-wrap: balance;
    }

    p {
      margin: 0 0 0 22px;
      max-width: 23ch;
      font-size: 28px;
      line-height: 1.12;
      letter-spacing: -0.03em;
      color: rgba(255, 255, 255, 0.92);
    }

    .brand {
      position: absolute;
      top: 56px;
      left: 66px;
      width: 192px;
      filter: invert(1);
    }
  </style>
</head>
<body>
  <img class="photo" src="../images/leadership-camp/hero.jpeg" alt="">
  <div class="overlay" aria-hidden="true"></div>
  <img class="brand" src="../brand/logo/adaptivio-logo-black.svg" alt="">
  <main class="frame">
    <p class="eyebrow">Adaptivio</p>
    <h1>Leadership Camp Founders</h1>
    <p>Třídenní týmová zkušenost pro firmy, které chtějí vidět schopnosti lidí mimo běžné role a porady.</p>
  </main>
</body>
</html>
