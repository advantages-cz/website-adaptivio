meta:
  title: Adaptivio Design System
  description: >-
    Přehled vizuálních pravidel, komponent a rozestupů, ze kterých stavíme
    landing pages Adaptivio. Slouží jako společný základ pro návrh, obsah i
    další úpravy webu.

principles:
  - name: Editorial clarity
    description: >-
      Sekce mají působit čistě a čitelně. Titulek, úvodní text a další obsah
      mají mít jasné pořadí a nemají se zbytečně duplikovat mezi breakpointy.
  - name: Shared section rhythm
    description: >-
      Vertikální rozestupy se řídí společnými tokeny. Když sekce není sticky,
      má obsah sedět v předvídatelném bloku s vyváženým prostorem nahoře i
      dole.
  - name: Sticky is a system
    description: >-
      Sticky chování patří jen desktopu od 1280px. Všechny sticky sekce mají
      používat stejná pravidla, stejné třídy a stejné JS hooky.
  - name: Variants over one-offs
    description: >-
      Náladu a kontrast měníme přes modifikátory a CSS proměnné, ne přes
      jednorázové třídy pro jednu konkrétní sekci.
  - name: Semantic tokens over raw values
    description: >-
      Komponenty mají ideálně používat významové tokeny jako `accent-text`
      nebo `accent-surface`. Přímé hex hodnoty a jednorázová `rgba` patří do
      foundations, ne do rozhodování uvnitř komponent.
  - name: Accessibility is part of the system
    description: >-
      Kontrast, focus stavy a omezení pohybu nejsou doplněk navíc. Patří přímo
      do definice systému a musí být pod kontrolou v tokenech, komponentách i
      na preview stránce.

foundations:
  colors:
    - name: Ink
      value: "#000000"
      usage: Primární text, tmavé plochy a těla timeline karet.
    - name: Paper
      value: "#FFFFFF"
      usage: Základní podklad a světlé karty.
    - name: Orange
      value: "#FF6512"
      usage: Primární akcent pro plochy, CTA tlačítka a zvýraznění.
    - name: Blue
      value: "#81EAFC"
      usage: Sekundární akcent, tmavé sticky sekce, jemné gradienty a focus ring.
    - name: Muted Ink
      value: "rgba(0, 0, 0, 0.66)"
      usage: Delší copy a podpůrné texty.
    - name: Accent Surface
      value: "var(--orange)"
      usage: Významový token pro akcentní plochy.
    - name: Accent Text
      value: "var(--orange)"
      usage: >-
        Významový token pro akcentní text nebo dekorativní akcent tam, kde
        kontrast dovolí jeho přímé použití.
    - name: Accent On Surface
      value: "var(--ink)"
      usage: Text a ikony nad oranžovou plochou.

  typography:
    - name: Display leading
      value: "1.08"
      usage: Hero a dominantní sekční headline.
    - name: Heading leading
      value: "1.12"
      usage: H2, H3 a big quote titulky.
    - name: Lead leading
      value: "1.42"
      usage: Výrazné lead/perex bloky.
    - name: Copy leading
      value: "1.68"
      usage: Delší text a vysvětlující copy.
    - name: UI small leading
      value: "1.48"
      usage: Eyebrows, metadata a malé popisky.
    - name: Font family
      value: '"Matter Trial", Arial, Helvetica, sans-serif'
      usage: Jednotná display i UI typografie.

  spacing:
    - name: Base unit
      value: 8px
      usage: Základní jednotka pro vnitřní spacing a sticky sekce.
    - name: Desktop section space
      value: 96px
      usage: Výchozí vertikální padding pro běžné sekce a center bands na desktopu.
    - name: Mobile section space
      value: 56px
      usage: Kompaktní vertikální padding sekcí na mobilu od 767px dolů.
    - name: Hero bottom space
      value: 32px
      usage: Spodní odsazení hero bandu.
    - name: Sticky head to cards gap
      value: 48px
      usage: Desktop i tablet mezera mezi sticky headem a gridem.
    - name: Sticky grid gap
      value: 24px
      usage: Mezery mezi sticky kartami.
    - name: Centered band rule
      value: Symmetric vertical gap
      usage: >-
        Když sekce není sticky a má větší výšku, obsah má sedět uprostřed a
        působit vyváženě nahoře i dole.

layout_modes:
  - name: Centered band
    min_width: "0px"
    description: >-
      Nesticky sekce jako quote, final nebo běžný obsah používají společný
      sekční rytmus a obsah sedí uvnitř jednoho čistého bloku.
  - name: Sticky desktop
    min_width: "1280px"
    description: >-
      Headline a grid žijí uvnitř `stickysection-pin`. Pin zůstává připnutý a
      karty se postupně odhalují podle scrollu.
  - name: Static tablet
    min_width: "768px"
    max_width: "1279px"
    description: >-
      Head zůstává ve dvou sloupcích. Sticky se vypíná a grid se skládá do
      klidnějšího statického layoutu.
  - name: Static mobile
    max_width: "767px"
    description: >-
      Headline, perex i obsah se skládají do jednoho sloupce a dekorativní
      oddělovač mizí.

stickysection:
  classes:
    - stickysection
    - stickysection--soft
    - stickysection--dark
    - stickysection--paper
    - stickysection--cards-1
    - stickysection--cards-2
    - stickysection--cards-3
    - stickysection--cards-4
    - stickysection--tall
    - stickysection-scene
    - stickysection-pin
    - stickysection-head
    - stickysection-grid
    - stickysection-card
  metrics:
    - name: Pin top offset
      value: 112px
      usage: Začátek sticky pinu pod headerem.
    - name: Viewport cap for runway
      value: 760px
      usage: >-
        Sticky scéna na desktopu neroste do nekonečna; po této výšce se její
        délka zastropuje.
    - name: Cards-2 runway
      value: "calc((min(100svh, 760px) - 112px) + 560px)"
      usage: Krátká sticky scéna pro 2 karty.
    - name: Cards-3 runway
      value: "calc((min(100svh, 760px) - 112px) + 700px)"
      usage: Výchozí sticky scéna pro 3 karty.
    - name: Cards-4 runway
      value: "calc((min(100svh, 760px) - 112px) + 860px)"
      usage: Délka sticky scény pro 4 karty.
    - name: Desktop card height
      value: 280px
      usage: Výchozí minimální výška sticky karet.
    - name: Tall card height
      value: 320px
      usage: Vyšší karty pro people a podobné obsahy.
    - name: Tablet card min height
      value: 200px
      usage: Výchozí minimální výška sticky karet v tablet/static režimu.
    - name: Tall tablet card min height
      value: 340px
      usage: Vyšší tabletová varianta pro people a další tall sticky sekce.
    - name: Desktop card padding
      value: "34px 32px 30px"
      usage: Vnitřní spacing sticky karet na desktopu.
    - name: Tablet card padding
      value: "28px 26px 26px"
      usage: Vnitřní spacing sticky karet na tabletu.
    - name: Mobile card padding
      value: "26px 22px 24px"
      usage: Vnitřní spacing sticky karet na mobilu.
    - name: Lead copy width
      value: 42ch
      usage: Výchozí maximální šířka sticky perexu v aktuální implementaci.
    - name: Desktop pin min height
      value: "calc(100svh - 112px)"
      usage: >-
        Sticky pin drží minimálně výšku viewportu pod headerem, aby i kratší
        obsah šel vycentrovat bez lokálních hacků.
  motion:
    - name: Desktop only
      value: "min-width: 1280px and prefers-reduced-motion: no-preference"
      usage: Motion se zapíná jen ve sticky desktop režimu.
    - name: Card transform vars
      value: "--stickysection-card-y / --stickysection-card-scale / --stickysection-card-opacity"
      usage: CSS proměnné pro scroll-driven vstup karet.
    - name: JS hooks
      value: "data-stickysection-scene / data-stickysection-card"
      usage: Jediné povolené generické hooky pro JS.
    - name: Tall viewport pin padding
      value: "clamp(24px, calc((100svh - 820px) * 0.18), 72px)"
      usage: >-
        Na vysokých desktop viewports dostává sticky pin symetrický vertikální
        padding, takže kratší head i grid nepůsobí přilepeně nahoře.

accessibility:
  - name: Text contrast
    requirement: "Běžný text minimálně 4.5:1, velký text minimálně 3:1"
    note: >-
      Akcentní oranžová #FF6512 se na bílém podkladu nemá spoléhat jako jediný
      nosič malého textu. U malých labelů ji používej jen jako jemný
      konstrukční detail, typicky přes tenkou linku nebo subtlní oddělovač.
  - name: Keyboard focus
    requirement: "Interaktivní prvky musí mít viditelný focus-visible stav"
    note: Focus ring je samostatný token, ne vedlejší efekt hoveru.
  - name: Motion fallback
    requirement: "Scroll-driven motion jen při prefers-reduced-motion: no-preference"
    note: >-
      Stickysection už má desktop-only motion gate; nové motion patterny musí
      dodržet stejnou disciplínu.

governance:
  - name: Source of truth
    description: >-
      Když se mění token nebo sdílený pattern, změna musí projít přes data, CSS
      i preview stránku, aby dokumentace nezestárla vedle implementace.
  - name: Component-first reuse
    description: >-
      Nová landing sekce má nejdřív zkusit existující komponenty a modifikátory.
      Nový typ sekce je až poslední krok.
  - name: Semantic naming
    description: >-
      Preferuj názvy podle role v systému, ne podle momentální barvy nebo
      konkrétní stránky. To zvyšuje šanci, že token přežije redesign.

patterns:
  - name: Hero
    class: hero
    kind: Immersive band
    description: Úvodní fullscreen blok s fotografií, overlayem, H1, leadem a hlavními CTA.
    rules:
      - Hero je jediný fullscreen surface.
      - Text neleží v kartě, ale přímo nad médiem.
      - Pod headline musí zůstat čitelný další krok přes lead a CTA.
  - name: Section Head
    class: section-head
    kind: Reusable heading block
    description: >-
      Kombinace eyebrow, titulku, volitelného textu pod titulkem a volitelného
      perexu v pravém sloupci, která se skládá podle breakpointů.
    rules:
      - Pořadí obsahu je eyebrow, headline, copy, perex.
      - Desktop a tablet mohou použít dvousloupcové rozložení s perex rule.
      - Mobile skládá obsah do jednoho sloupce bez levé rule.
      - >-
        Titulek je dominantní prvek, text pod ním zůstává podpůrný a perex je
        doprovodný blok vpravo.
  - name: Stickysection
    class: stickysection
    kind: Editorial scene
    description: >-
      Hlavní sdílený pattern pro sekce s kartami a případným desktop sticky
      chováním.
    rules:
      - >-
        Pojmenování layoutu zůstává generické a obsahové sekce si nemají
        vytvářet vlastní systém tříd.
      - >-
        Pozadí může v pinned režimu přetéct přes viewport, ale sekční spacing
        se stále řídí tokeny.
      - Když sticky skončí, sekce se vrací do běžného rytmu daného spacing tokeny.
      - Intro může používat stejný sticky model a stejné JS hooky bez vlastního motion systému.
  - name: Timeline
    class: timeline
    kind: Process strip
    description: >-
      Tři kroky procesu s číslovanými body a lehce klikatou trasou na desktopu
      a svislou osou na mobilu.
    rules:
      - Desktop může vést kroky po zalomené trase, ne nutně po jedné rovné ose.
      - Mobile timeline se skládá na 44px osu se svislou linkou.
      - Sticky varianta používá stejný scroll model a stejné JS hooky jako stickysection.
  - name: Quote
    class: quote-section
    kind: Centered band
    description: Vyšší meziblok s velkým blockquote a navazující copy.
    rules:
      - Na desktopu se obsah chová jako center band uvnitř vyšší sekce.
      - Sticky varianta může připnout eyebrow a headline a animovat jen navazující copy blok.
      - Na mobilu se band zkracuje a zůstává kompaktní.
      - >-
        Rozestupy quote sekce se mají řídit systémovým rytmem, ne jednorázovým
        lokálním hackem.
  - name: Final CTA
    class: final
    kind: Closing band
    description: Závěrečný dark band s headline, leadem a CTA.
    rules:
      - Působí jako uzavírací scéna s jednokartovou sticky kompozicí na desktopu.
      - Obsah má zůstat čistý a jednosměrný, bez dalších podsekcí.
      - Scroll cue může používat stejné datové prahy jako ostatní sticky scény.
  - name: People
    class: people
    kind: Profile strip
    description: Dvoukartová people sekce s fotkou, jménem a krátkým profilem.
    rules:
      - Sekce staví na `stickysection` systému a používá `stickysection--paper stickysection--cards-2 stickysection--tall`.
      - Profilová karta skládá médium a text do jednoho sdíleného layoutu bez wrapperů jen pro jednu stránku.
      - Na menších breakpointech se layout láme do jednoho sloupce bez duplikace obsahu.
      - Pokud konkrétní portrét potřebuje jiný crop, nastavuje se v datech přes `image_position` pro sdílený `object-position`, ne přes jednorázovou CSS třídu.

examples:
  sticky:
    theme: soft
    cards: 3
    eyebrow: Stickysection
    title: Strukturovaná scéna pro editorial karty.
    copy: >-
      Sticky pattern drží titulek a úvodní text v jedné scéně a karty skládá
      do sdíleného gridu. Na desktopu může zůstat připnutý, na menších
      breakpointech se překládá do statického layoutu.
    items:
      - label: Head
        title: Jeden headline blok
        copy: Eyebrow, titulek a perex používají stejná pravidla a stejné rozestupy.
      - label: Grid
        title: Sdílené karty
        copy: Karty drží stejné rozestupy, padding, výšku i motion tokeny.
      - label: Motion
        title: Desktop only
        copy: Scroll-driven vstup patří jen desktop sticky režimu a mimo něj se vypíná.
  quote:
    eyebrow: Quote
    title: Zkušenost, ke které se dá vracet.
    copy: >-
      Centered band pattern používá vyvážený sekční rytmus a nechává obsah
      sedět uvnitř jednoho čistého bloku.
  timeline:
    theme: soft
    cards: 3
    eyebrow: Timeline
    title: Tři kroky v jednom proudu.
    copy: >-
      Process strip drží tři očíslované kroky v jedné trase a citlivě je
      překládá mezi desktopem a mobilem.
    items:
      - step: "1"
        title: Pojmenování
        copy: Nejprve se zpřesní situace a rozhodující otázka.
      - step: "2"
        title: Ověření
        copy: Pak se odděluje dojem od reality a hledá se funkční tvar řešení.
      - step: "3"
        title: Přenos
        copy: Nakonec se zkušenost vrací zpět do další práce jako společný jazyk.
