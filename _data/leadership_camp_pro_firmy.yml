meta:
  title: Leadership Camp pro firmy
  description: >-
    Když se hodnota práce ztrácí mezi rolemi, poradami a domněnkami, 
    třídenní týmová zkušenost mimo běžný provoz pomůže podívat se na ni zblízka.
  canonical: /landing/leadership-camp-pro-firmy/
  og_image: /assets/social/leadership-camp-og-v2.png
  og_image_type: image/png
  og_image_alt: Leadership Camp pro firmy od Adaptivio
brand:
  name: Leadership Camp
  cta_label: Ozvěte se mi
  cta_url: "#odpovedni-formular"
hero:
  eyebrow: Týmová zkušenost pro firmy
  title: Tři dny mimo běžné role
  lead: >-
    Na tři dny vystoupíte z rolí, porad a domněnek. Společně si sáhnete na
    otázku, která se v běžném provozu může vytratit:
    <i>&bdquo;Kde se naše práce mění v hodnotu?&ldquo;</i>
  image: /assets/images/leadership-camp/hero.jpeg
  image_alt: Účastníci Leadership Campu při společné práci v místnosti
  primary_cta:
    label: Ozvěte se mi
    url: "#odpovedni-formular"
  secondary_cta:
    label: Jak to funguje
    url: "#uvod"
intro:
  id: uvod
  eyebrow: Co běžná porada neukáže
  title: Malý projekt jako zrcadlo týmu
  copy: >-
    Porada ukáže, co si kdo myslí. Malý projekt rychle ukáže, kde práce
    opravdu vytváří hodnotu a kde ne — dřív, než z ní vznikne velký projekt, dlouhá debata
    nebo drahý omyl. Zároveň odkryje schopnosti a přínosy, které v běžném provozu
    často zůstávají schované.
  perex: >-
    Během tří dnů vezmete téma, na kterém vám záleží, a zmenšíte ho do podoby,
    kterou jde rychle vyzkoušet. Připravíte jednoduchou první verzi, pustíte ji
    ven a získáte zpětnou vazbu. Projekt není cílem. Je to nejkratší cesta
    k tomu, aby tým uviděl, kde práce vytváří hodnotu — a co do ní sám přináší.
  metrics:
    - value: "3"
      label: dny mimo běžný provoz
    - value: "10–20"
      label: lidí v jednom běhu
    - value: "3–4"
      label: týmy po ~5 lidech
    - value: "0"
      label: teorie odtržené od reality
      tone: accent
sections:
  - type: stickysection
    theme: soft
    cards: 3
    eyebrow: Pro koho
    title: Pro týmy, které tuší, že další porada už nestačí
    copy: >-
      Pro firmy kde lidem nechybí snaha,
      ale často jim chybí společný obraz. Každý vidí práci z jiného 
      místa — a právě tam se ztrácí nápady na zlepšení i nové příležitosti.
    visual:
      type: convergence
      figures:
        - position: front-left
        - position: front-right
        - position: back-center
    items:
      - label: Složení
        title: Týmy napříč firmou
        copy: >-
          Pro vedení, specialisty, obchod, produkt i provoz — pro lidi,
          kteří se v běžné práci potkávají hlavně přes role.
      - label: Situace firmy
        title: Firmy v nové etapě
        copy: >-
          Pro chvíle, kdy rostete, měníte způsob práce, reorganizujete nebo zjišťujete,
          jak AI promění každodenní práci.
      - label: Vliv v týmu
        title: Lidé s reálným vlivem
        copy: >-
          Pro lidi, kteří nemusí mít manažerský titul, ale každý den ovlivňují
          zákazníka, kolegu, uživatele nebo směr práce.
  - type: stickysection
    theme: dark
    cards: 3
    eyebrow: Proč teď
    title: Práce se mění rychleji než role
    copy: >-
      Když se vám práce přeskládává pod rukama, nestačí jen přepsat role
      nebo čekat na nové zadání shora. Potřebujete rychleji poznat, kde se
      ve vaší firmě rodí schopnost jednat, učit se a vytvářet hodnotu.
    perex_html: >-
      <span class="proof-stat"><strong><span data-countup-to="40">40</span> %</strong> dovedností</span>
      Podle World Economic Forum se <strong>do roku 2030 promění téměř 40 % pracovních
      dovedností.</strong> Nejde jen o nové profese. Nové nástroje, AI a měnící se očekávání
      zákazníků proměňují i to, co lidé potřebují umět ve své současné práci.
    source: "Zdroj: World Economic Forum, Future of Jobs Report 2025."
    items:
      - label: Staré mapy
        title: Včerejší role
        copy: >-
          Role pomáhají firmu řídit. Když se práce mění, ukazují
          spíš to, kým člověk byl včera, než co může přinést dnes. Právě tam
          snadno přehlédnete schopnost, kterou teď potřebujete.
      - label: Bezpečné cesty
        title: Drahá jistota
        copy: >-
          Když je práce stabilní, čekání na zadání chrání firmu před chaosem.
          Když se ale práce mění, stejné čekání začne firmu stát čas, nápady 
          i blízkost k zákazníkovi.
      - label: Skrytá hodnota
        title: Platíte, co nevidíte
        copy: >-
          Nové role se snadno kreslí od stolu, ale hledat lidi je drahé.
          Než začnete investovat do změny sestavy, stojí za to zjistit, jaké schopnosti
          už ve vašem týmu tvoří hodnotu — jen zatím nemohly vyrůst.
  - type: timeline
    id: prubeh
    theme: soft
    cards: 3
    eyebrow: Jak to probíhá
    title: Tři dny, které si jindy nedovolíte
    perex: >-
      Camp má jednoduchý rytmus: nejdřív vystoupíte z běžných rolí,
      potom vyjdete ven za lidmi a nakonec se vrátíte se zkušeností, kterou
      společně pojmenujete. Každý den posune projekt i tým o krok dál.
    items:
      - step: "1. den"
        label: 1. den — dovnitř
        title: Témata a týmy
        copy: >-
          Začnete u témat, která lidé opravdu chtějí řešit. Podle nich sestavíte
          pracovní týmy o cca 5 lidech. Teprve potom si pojmenujete, co kdo umí
          a jakou výbavu může do společné práce přinést.
      - step: "2. den"
        label: 2. den — ven
        title: Očima zákazníka
        copy: >-
          Téma zmenšíte na konkrétní problém, zákazníka a první obrys řešení.
          Pak vyjdete ven mluvit s lidmi, ověřovat domněnky a upravovat
          směr podle toho, co skutečně uslyšíte.
      - step: "3. den"
        label: 3. den — zpět
        title: Řešení a reflexe
        copy: >-
          Připravíte první jednoduchou podobu řešení, představíte ji a dostanete
          přímou zpětnou vazbu. Na konci pojmenujete, co se povedlo, co nevyšlo
          a co si z toho chcete odnést zpět do práce.
  - type: stickysection
    id: prinos
    theme: paper
    cards: 3
    eyebrow: Co si odnesete
    title: Jedna zkušenost, na které se dá stavět
    perex: >-
      Camp neskončí tím, že se tým vrátí z příjemné akce. Odnesete si společnou
      situaci, ve které uvidíte lidi, práci, zákazníka i hodnotu jinak než
      v běžném provozu. Právě k ní se můžete vracet, když budete řešit další
      změny, projekty nebo spolupráci.
    card_class: outcome-row
    items:
      - label: Člověk
        title: Víc než pracovní škatulka
        copy: >-
          Pojmenujete si schopnosti, které často používáte samozřejmě:
          všímavost, odvahu zeptat se, cit pro druhého člověka nebo schopnost
          udělat první krok i ve chvíli, kdy ještě není všechno jasné.
      - label: Tým
        title: Zákazník na vlastní oči
        copy: >-
          Napříč firmou zažijete přímý kontakt se zákazníkem, uživatelem
          nebo kolegou, kterému má práce pomoct. Najednou nejde o názor oddělení,
          ale o společnou zkušenost s tím, co někdo opravdu potřebuje.
      - label: Firma
        title: Zodpovědnost bez zbytečného rizika
        copy: >-
          Samostatnost nemusí znamenat náhodné kroky bez kontroly.
          Když lidé rozumí problému, zákazníkovi a dopadu, mohou jednat dřív,
          učit se rychleji a přinášet hodnotu s menším rizikem.
  - type: people
    id: lektori
    eyebrow: Kdo camp vede
    title: Podnikání, technologie, vzdělávání a práce s lidmi
    perex: >-
      Camp vedou Tomáš Vavrda a Taťána Beránková Císařová. Spojují zkušenost s
      podnikáním, technologickou změnou a vzděláváním, které stojí na zážitku,
      reflexi a odvaze zkusit věci dřív, než si člověk začne úplně věřit.
    items:
      - tone: light
        label: Podnikání a technologie
        title: Tomáš Vavrda
        copy: >-
          Podnikatel, zakladatel Adaptivio a technologického frameworku ORIGAM.
          Prošel více než 150 projekty a dlouhodobě zkoumá, jak lidé a
          organizace zvládají změnu, složitost a nové způsoby práce.
        image: /assets/images/leadership-camp/tomas-vavrda.jpg
        image_alt: Tomáš Vavrda
        image_position: center 4%
      - tone: dark
        label: Vzdělávání a práce s lidmi
        title: Taťána Beránková Císařová
        copy: >-
          Pedagožka, inovátorka ve vzdělávání a učitelka ekonomiky. Společně s
          Tomášem šest let vede týmy studentů generace Z k podnikavosti a
          pomáhá učitelům vstupovat do nové role.
        image: /assets/images/leadership-camp/tatana-berankova-cisarova.jpg
        image_alt: Taťána Beránková Císařová
        image_position: 54% 12%
  - type: stickysection
    theme: paper
    cards: 4
    eyebrow: Prakticky
    title: Zakázkový camp pro celou firmu nebo tým
    perex: >-
      Camp ladíme podle vašeho kontextu, ale obsah nevymýšlíme předem za tým.
      Právě tím vzniká bezpečný prostor, kde se lidé mohou zapojit jinak než
      v běžném provozu: vzít si téma za své, vyzkoušet novou odpovědnost
      a podívat se na práci očima zákazníka.
    card_class: outcome-row
    items:
      - label: Koho zapojit
        title: Smíšený tým, ne jen manažeři
        copy: >-
          Nejlépe funguje skupina lidí napříč firmou: vedení, obchod, provoz,
          produkt, podpora i lidé bez formálního titulu. Důležitý není název
          pozice, ale různé pohledy na práci, zákazníka a tým.
      - label: Příprava
        title: Kontext ano, zadání ne
        copy: >-
          Před campem si ujasníme, proč ho děláte, koho chcete zapojit a co se
          ve firmě mění. Nepřipravujeme hotová témata ani projekty. Ta vznikají
          až na místě z toho, k čemu mají lidé skutečný vztah.
      - label: Výstup
        title: Společná zkušenost
        copy: >-
          Výsledek nemusí mít jednu podobu. Někdy vznikne nápad na další projekt,
          jindy silné poznání o zákazníkovi, týmu nebo vlastní roli v práci.
          Důležité je, že nejde o hodnocení lidí, ale o společnou zkušenost,
          ze které si každý může něco odnést.
      - label: Po campu
        title: Reflexe s odstupem
        copy: >-
          Po návratu pomůžeme zkušenost usadit. S odstupem se podíváme, co se
          opravdu propsalo do práce, co má pokračovat a jak z toho udělat další
          konkrétní krok ve firmě.
final_cta:
  title: Krize je drahý učitel, dotkněte se reality bezpečněji.
  lead: >-
    Vystupte na tři dny ze zajetých kolejí a vraťte se se společným
    zážitkem. Zahlédnete v něm vlastní přínos, práci ostatních i
    hodnotu, kterou společně přinášíte zákazníkům.
  cta:
    label: Ozvěte se mi
    url: "#odpovedni-formular"
response_form:
  id: odpovedni-formular
  eyebrow: Kontaktní formulář 
  title: Chcete zjistit, jestli se camp hodí pro váš tým?
  copy: >-
    Napište nám. Ozveme se vám osobně a společně zjistíme, jestli dává
    smysl se potkat.
  action: https://docs.google.com/forms/d/e/1FAIpQLSf_T3e0aFQ8ee9qOexqqWSNTjh-E1TxBZcp2tD_SNP7kPPohw/formResponse
  success_url: /landing/leadership-camp-pro-firmy/dekujeme/
  submit_label: Ozvěte se mi
  privacy_note: >-
    Zpráva se uloží do Google Forms. Nepřidáme vás do žádného automatického
    mailingu — ozve se vám člověk z týmu Adaptivio.
  fields:
    - label: Váš e-mail (povinný)
      name: entry.313773228
      type: email
      pattern: '^[^\s@]+@[^\s@]+\.[^\s@]{2,}$'
      validation_message: Zadejte e-mail ve tvaru jmeno@firma.cz.
      placeholder: vase@firma.cz
      required: true
    - label: Telefon, pokud chcete zavolat
      name: entry.1293957438
      type: tel
      inputmode: tel
      placeholder: +420 123 456 789
      required: false
    - label: Pár slov k tomu
      name: entry.825859294
      type: textarea
      rows: 3
      placeholder: >-
        Pro jaký tým o campu uvažujete? Co vás zaujalo? Stačí jedna věta.
      required: false
