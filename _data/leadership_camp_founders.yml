meta:
  title: Leadership Camp Founders | Adaptivio
  description: >-
    Leadership Camp je třídenní týmová zkušenost pro firmy, které chtějí
    vystoupit z běžných rolí, sáhnout si na realitu a lépe porozumět tomu, jak
    jejich tým přemýšlí, jedná a spolupracuje.
  canonical: /landing/leadership-camp-founders/
  og_image: /assets/social/leadership-camp-og.jpg
  og_image_alt: Leadership Camp Founders od Adaptivio
brand:
  name: Leadership Camp
  cta_label: Chci vědět víc
  cta_url: https://forms.gle/leadership-camp-placeholder
hero:
  eyebrow: Leadership Camp pro firmy
  title: Tři dny mimo běžné role.
  lead: >-
    Na tři dny vystoupíte z rolí, porad a domněnek a společně si sáhnete na
    otázku: <b>Kde se naše práce mění v hodnotu?</b>
  image: /assets/images/leadership-camp/hero.jpeg
  image_alt: Účastníci Leadership Campu při společné práci v místnosti
  primary_cta:
    label: Chci vědět víc
    url: https://forms.gle/leadership-camp-placeholder
  secondary_cta:
    label: Jak to funguje
    url: "#film"
intro:
  id: film
  eyebrow: Co běžná porada neukáže
  title: Malý projekt jako zrcadlo týmu.
  copy: >-
    Malý projekt rychle ukáže, jak spolu nasloucháte, ověřujete domněnky,
    přebíráte odpovědnost a měníte nejistotu v další krok. Ne jako test lidí,
    ale jako společnou zkušenost, ke které se dá vracet.
  perex: >-
    Během tří dnů se odrazíte od tématu, na kterém vám záleží, a vytvoříte z něj
    společně něco nového. Nepracujete na interním projektu. Začnete od nuly:
    pojmenujete problém, najdete lidi, kterým může jeho řešení pomoct, postavíte
    jednoduchou zkušební verzi a ověříte ji v terénu.
  metrics:
    - value: "3"
      label: dny mimo běžný provoz
    - value: "10-20"
      label: lidí v jedné skupině
    - value: "2–3"
      label: malé projekty jako zrcadla týmů
    - value: "0"
      label: teorie odtržené od reality
      tone: accent
sections:
  - type: stickysection
    theme: dark
    cards: 3
    eyebrow: Proč teď
    title: Práce nemizí. Přeskládává se.
    perex: >-
      Budoucnost vaší firmy nezačíná jen u strategie. Začíná i u lidí, kteří
      umějí číst situaci, učit se z praxe a pohnout věcmi, když popis práce
      přestane stačit.
    card_class: story-row
    items:
      - label: Role
        title: Nejste jen své pozice.
        copy: >-
          Obchod, produkt, delivery, podpora, vedení. V běžném provozu vás role
          drží pohromadě, ale také vás umí zakrýt. Camp na tři dny změní
          pravidla hry a nechá vás vystoupit z obvyklých škatulek.
      - label: Realita
        title: Domněnka musí ven z místnosti.
        copy: >-
          Vyjdete za zákazníky, kolegy nebo uživateli. Rychle poznáte, co zní
          dobře jen u stolu a co má sílu pohnout druhým člověkem k akci.
      - label: Zážitek
        title: Schopnosti se ukážou v pohybu.
        copy: >-
          Na malém projektu uvidíte, kdo umí naslouchat, kdo zahlédne
          příležitost, kdo rozhýbe ostatní a kdo dokáže z mlhy udělat konkrétní
          další krok.
  - type: timeline
    id: prubeh
    theme: soft
    cards: 3
    eyebrow: Jak to probíhá
    title: Tři dny, které zvednou tým ze židlí.
    perex: >-
      Nejdřív pojmenujete svou osobní výbavu. Pak najdete problém, který stojí
      za pozornost. Nakonec vyjdete do terénu ověřit, co obstojí mimo místnost.
    items:
      - step: "1. den"
        label: Dovnitř
        title: Výbava a problém
        copy: >-
          Vystoupíte z běžných rolí, pojmenujete své schopnosti a vyberete
          oblast, ve které máte energii i motivaci něco změnit.
      - step: "2. den"
        label: Ven
        title: Terén a první řešení
        copy: >-
          Oddělíte domněnky od reality, promluvíte se zákazníky, kolegy nebo
          uživateli a složíte první verzi řešení.
      - step: "3. den"
        label: Zpět
        title: Zkouška, porota a reflexe
        copy: >-
          Řešení otestujete, představíte odborné porotě, dostanete syrovou
          zpětnou vazbu a pojmenujete, co si chcete odnést zpět do práce.
  - type: stickysection
    theme: dark
    cards: 3
    eyebrow: Kontext změny
    title: Dovednosti se mění rychleji než popisy pracovních míst.
    perex_html: >-
      <span class="proof-stat"><strong><span data-countup-to="40">0</span> %</strong> dovedností</span>Podle
      World Economic Forum se do roku 2030 promění téměř 40 % pracovních
      dovedností. Mezeru v dovednostech přitom 63 % zaměstnavatelů označuje za
      hlavní překážku transformace.
    source: "Zdroj: World Economic Forum, Future of Jobs Report 2025."
    items:
      - label: Nové příležitosti
        indicator: up
        title: 170 mil.
        copy: >-
          nových rolí má vzniknout do roku 2030 kvůli technologickým,
          ekonomickým a demografickým změnám.
      - label: Mizející pozice
        indicator: down
        title: 92 mil.
        copy: >-
          rolí má ve stejném období zaniknout, protože některé činnosti a
          pracovní modely přestanou dávat smysl.
      - label: Celkový dopad
        indicator: up
        title: 78 mil.
        copy: >-
          pracovních míst má celkově přibýt. Rozhodovat ale nebude jistota
          pozice, nýbrž schopnost měnit způsob práce.
  - type: stickysection
    id: prinos
    theme: paper
    cards: 3
    eyebrow: Co si odnesete
    title: Uvidíte se jinak než v běžném provozu.
    perex: >-
      Neodvezete si jen dobrý pocit ze společného zážitku. Získáte konkrétní
      situaci, ke které se můžete vracet při dalších projektech, změnách i
      každodenní spolupráci.
    card_class: outcome-row
    items:
      - label: Člověk
        title: Schopnosti mimo pracovní škatulky
        copy: >-
          Pojmenujete si výbavu, kterou často berete jako samozřejmost:
          improvizaci, cit pro situaci, odvahu zeptat se, schopnost slyšet
          druhého člověka nebo dotáhnout nejasný nápad do prvního kroku.
      - label: Tým
        title: Rychlejší učení z praxe
        copy: >-
          Vyzkoušíte si malé pokusy místo dlouhých debat, ověřování místo
          domněnek a zpětnou vazbu dřív, než projekt nabobtná a ztěžkne.
      - label: Firma
        title: Společný jazyk pro další práci
        copy: >-
          Získáte společný zážitek a slovník pro práci s odpovědností,
          iniciativou a zákaznickou realitou. Ne jako audit lidí, ale jako
          oporu pro tým, který chce lépe rozumět sám sobě.
  - type: quote
    eyebrow: Přenos do další práce
    title: Zkušenost, ke které se dá vracet.
    scroll_cue_target: 0.985
    scroll_cue_complete_at: 0.96
    copy: >-
      Camp nevrací jen energii. Dá vám konkrétní situaci, na které uvidíte, jak
      oddělujete domněnky od toho, co se opravdu děje, jak spolupracujete a co 
      si z toho chcete přenést do další práce.
  - type: stickysection
    theme: soft
    cards: 3
    eyebrow: Pro koho
    title: Pro týmy, které tuší, že další porada už nestačí.
    perex: >-
      Pro firmy, které potřebují znovu přiblížit své lidi zákazníkovi, realitě
      a vlastní odpovědnosti. V základní variantě camp neotevírá citlivé interní
      projekty. Pokud chcete pracovat přímo se svými tématy, připravíme variantu
      s interním zadáním.
    items:
      - label: Složení týmu
        title: Smíšené týmy, které chtějí vidět víc než role.
        copy: >-
          Pro vedení, specialisty, obchod, produkt, delivery, podporu i týmy
          složené napříč firmou.
      - label: Situace firmy
        title: Firmy v nové etapě nebo pod tlakem změny.
        copy: >-
          Pro chvíle, kdy vstupujete do nové etapy, měníte způsob práce,
          reorganizujete nebo hledáte, co s vámi udělá AI.
      - label: Typ lidí
        title: Lidé, kteří ovlivňují druhé, i&nbsp;když neřídí tým.
        copy: >-
          Pro lidi, kteří možná nemají manažerský titul, ale každý den ovlivňují
          zákazníka, kolegu nebo uživatele.
  - type: people
    id: lektori
    eyebrow: Kdo camp vede
    title: Podnikání, technologie, vzdělávání a práce s lidmi.
    perex: >-
      Camp vedou Tomáš Vavrda a Taťána Beránková Císařová. Spojují zkušenost s
      podnikáním, technologickou změnou a vzděláváním, které stojí na zážitku,
      reflexi a odvaze zkusit věci dřív, než si člověk začne úplně věřit.
    items:
      - tone: light
        label: Podnikání a technologie
        title: Tomáš Vavrda
        copy: >-
          Podnikatel, zakladatel Adaptivio a technologického frameworku ORIGAM.
          Prošel více než 150 projekty a dlouhodobě zkoumá, jak lidé a
          organizace zvládají změnu, složitost a nové způsoby práce.
        image: /assets/images/leadership-camp/tomas-vavrda.jpg
        image_alt: Tomáš Vavrda
      - tone: dark
        label: Vzdělávání a práce s lidmi
        title: Taťána Beránková Císařová
        copy: >-
          Pedagožka, inovátorka ve vzdělávání a učitelka ekonomiky. Společně s
          Tomášem šest let vede týmy studentů generace Z k podnikavosti a
          pomáhá učitelům vstupovat do nové role.
        image: /assets/images/leadership-camp/tatana-berankova-cisarova.jpg
        image_alt: Taťána Beránková Císařová
  - type: stickysection
    theme: paper
    cards: 4
    eyebrow: Prakticky
    title: Zakázkový camp pro celou firmu nebo tým.
    perex: >-
      Konkrétní podobu ladíme podle skupiny, firemního kontextu a návazné práce.
    card_class: outcome-row
    items:
      - label: Formát
        title: Třídenní camp pro tým 10-20 lidí
        copy: >-
          Zakázkový camp pro celou firmu nebo vybraný tým. Skupina 10-20 lidí
          dává prostor pro skutečnou práci, terén i společnou reflexi.
      - label: Průběh
        title: Terén, prototyp a společná reflexe
        copy: >-
          Místo teorie od stolu jdete do terénu, stavíte první řešení,
          ověřujete ho mimo místnost a vracíte se se zpětnou vazbou od poroty i
          vlastního týmu.
      - label: Před a po
        title: Příprava a návaznost po campu
        copy: >-
          Před campem pojmenujeme potřeby a očekávání skupiny. Po campu
          pomůžeme zkušenost usadit, vrátit ji do firemního kontextu a převést
          do další práce.
      - label: Cena
        title: Cena podle rozsahu spolupráce
        copy: >-
          Konkrétní podobu i cenu ladíme podle skupiny, firemního kontextu a
          návaznosti, kterou spolu chcete po campu otevřít.
final_cta:
  eyebrow: Závěr
  title: Krize je drahý učitel, dotkněte se reality bezpečněji.
  lead: >-
    Vystupte na tři dny z rolí, porad a domněnek a vraťte se se společným
    zážitkem. Zahlédnete v něm vlastní přínos, práci ostatních i
    hodnotu, kterou společně přinášíte zákazníkům.
  cta:
    label: Chci vědět víc
    url: https://forms.gle/leadership-camp-placeholder
