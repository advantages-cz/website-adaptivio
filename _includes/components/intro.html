<section class="intro" id="{{ include.section.id }}">
  <div class="wrap intro-grid">
    {% include components/section-head.html section=include.section class="section-head--split intro-head" title_class="intro-title" copy_class="intro-copy" perex_class="intro-aside" %}
    <div class="intro-metrics" aria-label="Zakladni parametry campu">
      {% for item in include.section.metrics %}
      <article>
        <strong>{{ item.value }}</strong>
        <span>{{ item.label }}</span>
      </article>
      {% endfor %}
    </div>
  </div>
</section>
