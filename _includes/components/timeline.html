<section class="flow"{% if include.section.id %} id="{{ include.section.id }}"{% endif %}>
  <div class="wrap">
    <div class="section-head">
      <div class="section-heading-primary">
        <p class="eyebrow">{{ include.section.eyebrow }}</p>
        <h2>{{ include.section.title }}</h2>
      </div>
      <p class="copy">{{ include.section.copy }}</p>
    </div>
    <div class="timeline">
      {% for item in include.section.items %}
      <article>
        <strong>{{ item.step }}</strong>
        <h3>{{ item.title }}</h3>
        <p>{{ item.copy }}</p>
      </article>
      {% endfor %}
    </div>
  </div>
</section>
