<section class="flow"{% if include.section.id %} id="{{ include.section.id }}"{% endif %}>
  <div class="wrap">
    {% include components/section-head.html section=include.section class="section-head--split" %}
    <div class="timeline">
      {% for item in include.section.items %}
      <article>
        <strong>{{ item.step }}</strong>
        <h3>{{ item.title }}</h3>
        <p>{{ item.copy }}</p>
      </article>
      {% endfor %}
    </div>
  </div>
</section>
